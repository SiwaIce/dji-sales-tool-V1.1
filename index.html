.sw-hdr{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.6rem}
.sw-icon{font-size:2rem}.sw-hdr h3{color:#fff;margin:0}.sw-type{color:#888;font-size:0.8rem}
.sw-meta{display:flex;gap:0.8rem;flex-wrap:wrap;margin-bottom:0.6rem;font-size:0.75rem;color:#999}
.sw-meta a{color:#4fc3f7}.sw-desc{color:#ccc;margin-bottom:0.8rem;font-size:0.9rem}
.sw-vers{margin-top:0.8rem}.sw-vers h4{color:#4fc3f7;margin-bottom:0.4rem}

.sv-hdr h5{color:#fff;margin:0;font-size:0.95rem}.sv-price{color:#ffd700;font-size:0.8rem}
.sv-feat{font-size:0.75rem;color:#bbb}.sv-feat li{margin-bottom:0.15rem}
.sv-for{background:rgba(79,195,247,0.1);padding:0.3rem 0.6rem;border-radius:6px;color:#4fc3f7;font-size:0.75rem;margin-top:0.4rem}
details{margin-top:0.4rem;border:1px solid #222;border-radius:6px;padding:0.4rem 0.7rem}

.sw-lic{margin-top:0.8rem}.sw-lic h4{color:#4fc3f7;margin-bottom:0.4rem}

<body>
<header class="header">
<div class="hb" onclick="showPage('page-home')">🚁 DJI Enterprise <span>Sales Tool</span></div>
